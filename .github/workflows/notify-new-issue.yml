name: 新周报通知

on:
  push:
    paths:
      - 'docs/issue-*.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 获取最新周报文件名
        id: weekly
        run: |
          FILE=$(ls -t docs/issue-*.md | head -1)
          ISSUE=$(basename "$FILE" .md)
          echo "issue=$ISSUE" >> $GITHUB_OUTPUT

      - name: 计算签名并发送钉钉通知
        env:
          WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          timestamp=$(date +%s%3N)
          string_to_sign="${timestamp}\n${SECRET}"
          sign=$(echo -ne "$string_to_sign" | openssl dgst -sha256 -hmac "$SECRET" -binary | base64)
          sign_encoded=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$sign'''))")
          url="${WEBHOOK}&timestamp=${timestamp}&sign=${sign_encoded}"
          curl -s -X POST \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"新周报发布\",
                \"text\": \"## 🏫 校园信息化周报更新啦！\n\n${{ steps.weekly.outputs.issue }} 已发布\n\n👉 [点击阅读](https://chengfan196510.github.io/school-it-weekly/)\n\n每周五更新，关注不迷路～\"
              }
            }" \
            "$url"
